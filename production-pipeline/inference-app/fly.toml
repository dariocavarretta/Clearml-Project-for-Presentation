# fly.toml — Fly.io deployment config for YOLO Inference App
# Docs: https://fly.io/docs/reference/configuration/

app = "yolo-app-for-clearml-presentation"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[mounts]
  source      = "models_vol"
  destination = "/app/models"

[http_service]
  internal_port       = 8000
  force_https         = true        # auto HTTPS — no cert needed
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpus   = 1
